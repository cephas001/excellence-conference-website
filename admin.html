<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excellence Conference – Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="bg-gray-900 min-h-screen text-gray-100 font-sans p-4 md:p-8">
  <div id="login-view" class="max-w-sm mx-auto mt-16">
    <div class="flex justify-start mb-4">
      <button type="button" id="back-to-home-btn" class="text-gray-400 hover:text-white text-sm font-medium transition-colors flex items-center gap-1">
        <span aria-hidden="true">←</span> Home
      </button>
    </div>
    <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-xl">
      <h1 class="text-xl font-bold text-white mb-1">Admin sign in</h1>
      <p class="text-gray-400 text-sm mb-6">Sign in to manage speakers and testimonies.</p>
      <form id="login-form" class="space-y-4">
        <div>
          <label for="admin-email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
          <input type="email" id="admin-email" required autocomplete="email"
            class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-orange focus:border-transparent">
        </div>
        <div>
          <label for="admin-password" class="block text-sm font-medium text-gray-300 mb-1">Password</label>
          <input type="password" id="admin-password" required autocomplete="current-password"
            class="w-full px-3 py-2 rounded-lg bg-gray-700 border border-gray-600 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-accent-orange focus:border-transparent">
        </div>
        <p id="login-error" class="text-red-400 text-sm hidden"></p>
        <button type="submit" id="login-btn"
          class="w-full py-2.5 rounded-lg bg-accent-orange hover:bg-orange-600 text-white font-semibold transition-colors">Sign in</button>
      </form>
    </div>
  </div>

  <div id="admin-view" class="hidden max-w-4xl mx-auto">
    <header class="flex flex-wrap items-center justify-between gap-4 mb-8">
      <h1 class="text-2xl font-bold text-white">Speakers &amp; Testimonies</h1>
      <button type="button" id="sign-out-btn" class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-sm font-medium transition-colors">Sign out</button>
    </header>

    <div class="space-y-10">
      <!-- Speakers -->
      <section class="bg-gray-800 border border-gray-700 rounded-xl p-6">
        <h2 class="text-lg font-bold text-white mb-4">Speakers</h2>
        <div id="speakers-list" class="mb-6 space-y-2"></div>
        <button type="button" id="add-speaker-btn" class="mb-4 px-4 py-2 rounded-lg bg-accent-orange hover:bg-orange-600 text-sm font-medium">Add speaker</button>
        <form id="speaker-form" class="hidden mt-4 p-4 bg-gray-700/50 rounded-xl border border-gray-600 space-y-3">
          <input type="hidden" id="speaker-id" value="">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Name</label>
              <input type="text" id="speaker-name" required class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Role</label>
              <input type="text" id="speaker-role" required class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1">Bio</label>
            <textarea id="speaker-bio" rows="2" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm resize-none"></textarea>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Topic</label>
              <input type="text" id="speaker-topic" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Image URL</label>
              <input type="text" id="speaker-image" placeholder="/img/speaker1.jpg" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
          </div>
          <div class="flex gap-2">
            <button type="submit" class="px-4 py-2 rounded-lg bg-accent-orange hover:bg-orange-600 text-sm font-medium">Save</button>
            <button type="button" id="speaker-form-cancel" class="px-4 py-2 rounded-lg bg-gray-600 hover:bg-gray-500 text-sm font-medium">Cancel</button>
          </div>
        </form>
      </section>

      <!-- Testimonies -->
      <section class="bg-gray-800 border border-gray-700 rounded-xl p-6">
        <h2 class="text-lg font-bold text-white mb-4">Testimonies</h2>
        <div id="testimonies-list" class="mb-6 space-y-2"></div>
        <button type="button" id="add-testimony-btn" class="mb-4 px-4 py-2 rounded-lg bg-accent-orange hover:bg-orange-600 text-sm font-medium">Add testimony</button>
        <form id="testimony-form" class="hidden mt-4 p-4 bg-gray-700/50 rounded-xl border border-gray-600 space-y-3">
          <input type="hidden" id="testimony-id" value="">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Name</label>
              <input type="text" id="testimony-name" required class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Role</label>
              <input type="text" id="testimony-role" required class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Location</label>
              <input type="text" id="testimony-location" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Image URL</label>
              <input type="text" id="testimony-image" placeholder="/img/testimonial1.jpg" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1">Testimony</label>
            <textarea id="testimony-text" rows="3" required class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm resize-none"></textarea>
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-400 mb-1">Rating (1–5)</label>
            <input type="number" id="testimony-rating" min="1" max="5" value="5" class="w-20 px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
          </div>
          <div class="flex gap-2">
            <button type="submit" class="px-4 py-2 rounded-lg bg-accent-orange hover:bg-orange-600 text-sm font-medium">Save</button>
            <button type="button" id="testimony-form-cancel" class="px-4 py-2 rounded-lg bg-gray-600 hover:bg-gray-500 text-sm font-medium">Cancel</button>
          </div>
        </form>
      </section>

      <!-- Agenda -->
      <section class="bg-gray-800 border border-gray-700 rounded-xl p-6">
        <h2 class="text-lg font-bold text-white mb-4">Agenda</h2>
        <p class="text-gray-400 text-sm mb-4">Manage conference days and session items. Add days with any name you choose, then add sessions to each day.</p>
        <div id="agenda-days-list" class="mb-6 space-y-3"></div>
        <button type="button" id="add-agenda-day-btn" class="mb-4 px-4 py-2 rounded-lg bg-accent-orange hover:bg-orange-600 text-sm font-medium">Add day</button>

        <!-- Day form (add/edit day) -->
        <form id="agenda-day-form" class="hidden mt-4 p-4 bg-gray-700/50 rounded-xl border border-gray-600 space-y-3">
          <input type="hidden" id="agenda-day-id" value="">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div class="sm:col-span-2">
              <label class="block text-xs font-medium text-gray-400 mb-1">Day name / label</label>
              <input type="text" id="agenda-day-label" required placeholder="e.g. Day 1 – Tuesday, 19 May 2026" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Date (YYYY-MM-DD)</label>
              <input type="text" id="agenda-day-date" required placeholder="2026-05-19" pattern="\d{4}-\d{2}-\d{2}" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Order (number for sorting)</label>
              <input type="number" id="agenda-day-order" min="0" value="0" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
          </div>
          <div class="flex gap-2">
            <button type="submit" class="px-4 py-2 rounded-lg bg-accent-orange hover:bg-orange-600 text-sm font-medium">Save day</button>
            <button type="button" id="agenda-day-form-cancel" class="px-4 py-2 rounded-lg bg-gray-600 hover:bg-gray-500 text-sm font-medium">Cancel</button>
          </div>
        </form>

        <!-- Per-day: expandable items (shown when "Manage items" clicked) -->
        <div id="agenda-items-panel" class="hidden mt-4 p-4 bg-gray-700/30 rounded-xl border border-gray-600">
          <h3 class="text-sm font-bold text-white mb-2" id="agenda-items-day-label">Sessions for: …</h3>
          <input type="hidden" id="agenda-items-day-id" value="">
          <div id="agenda-items-list" class="mb-4 space-y-2"></div>
          <button type="button" id="add-agenda-item-btn" class="mb-4 px-4 py-2 rounded-lg bg-accent-orange/80 hover:bg-orange-600 text-sm font-medium">Add session</button>
          <button type="button" id="agenda-items-panel-close" class="ml-2 px-4 py-2 rounded-lg bg-gray-600 hover:bg-gray-500 text-sm font-medium">Close</button>

          <!-- Item form (add/edit session) -->
          <form id="agenda-item-form" class="hidden mt-4 p-4 bg-gray-700/50 rounded-lg border border-gray-600 space-y-3">
            <input type="hidden" id="agenda-item-index" value="">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Time</label>
                <input type="text" id="agenda-item-time" required placeholder="10:00 AM" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Type</label>
                <select id="agenda-item-type" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
                  <option value="simple">Simple</option>
                  <option value="detailed">Detailed (with speaker)</option>
                </select>
              </div>
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Title</label>
              <input type="text" id="agenda-item-title" required class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
            </div>
            <div>
              <label class="block text-xs font-medium text-gray-400 mb-1">Description (optional, HTML ok e.g. &lt;br&gt;)</label>
              <textarea id="agenda-item-description" rows="2" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm resize-none"></textarea>
            </div>
            <div id="agenda-item-detailed-fields" class="hidden space-y-3">
              <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Tag (e.g. Keynote, Panel, Workshop)</label>
                <input type="text" id="agenda-item-tag" placeholder="Keynote" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
              </div>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs font-medium text-gray-400 mb-1">Speaker name</label>
                  <input type="text" id="agenda-item-speaker-name" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
                </div>
                <div>
                  <label class="block text-xs font-medium text-gray-400 mb-1">Speaker role</label>
                  <input type="text" id="agenda-item-speaker-role" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
                </div>
              </div>
              <div>
                <label class="block text-xs font-medium text-gray-400 mb-1">Speaker image URL</label>
                <input type="text" id="agenda-item-speaker-image" placeholder="https://…" class="w-full px-3 py-2 rounded bg-gray-700 border border-gray-600 text-white text-sm">
              </div>
            </div>
            <div class="flex gap-2">
              <button type="submit" class="px-4 py-2 rounded-lg bg-accent-orange hover:bg-orange-600 text-sm font-medium">Save session</button>
              <button type="button" id="agenda-item-form-cancel" class="px-4 py-2 rounded-lg bg-gray-600 hover:bg-gray-500 text-sm font-medium">Cancel</button>
            </div>
          </form>
        </div>
      </section>
    </div>
  </div>

  <script type="module" src="/admin.js"></script>
</body>
</html>
