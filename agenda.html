<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excellence Conference - Agenda</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Ionicons for icons -->
  <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
</head>

<body class="bg-gray-900 pb-24">
  <div id="app" class="max-w-md mx-auto min-h-screen relative bg-gray-900">
    <!-- Header -->
    <header class="px-6 pt-8 pb-4 sticky top-0 bg-gray-900 z-10 border-b border-gray-800 animate-fade-in-up">
      <h1 class="text-3xl font-bold text-white">Agenda</h1>
    </header>

    <!-- Agenda by day (accordion) -->
    <main class="px-6 py-4">
      <div id="agenda-list" class="space-y-2">
        <!-- Day dropdowns and timelines injected here -->
      </div>
    </main>

    <!-- Speaker detail modal -->
    <div id="speaker-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-black/70 backdrop-blur-sm" aria-hidden="true">
      <div class="bg-gray-800 border border-gray-700 rounded-2xl max-w-sm w-full max-h-[85vh] overflow-hidden shadow-xl">
        <div class="p-5">
          <div class="flex justify-end mb-2">
            <button type="button" id="speaker-modal-close" class="p-2 rounded-lg text-gray-400 hover:text-white hover:bg-gray-700 transition-colors" aria-label="Close">
              <ion-icon name="close" class="text-2xl"></ion-icon>
            </button>
          </div>
          <div id="speaker-modal-content" class="text-center">
            <!-- Filled by JS -->
          </div>
        </div>
      </div>
    </div>

    <!-- Bottom Navigation -->
    <nav
      class="fixed bottom-6 left-1/2 bg-gray-800/95 backdrop-blur-sm rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.5)] px-4 py-2.5 flex items-center justify-center gap-8 z-50 border border-gray-700" style="transform: translateX(-50%);">
      <a href="index.html" class="flex flex-col items-center gap-1 text-gray-400 hover:text-accent-orange transition-colors">
        <ion-icon name="home" class="text-xl"></ion-icon>
        <span class="text-xs font-medium">Home</span>
      </a>
      <a href="agenda.html" class="flex flex-col items-center gap-1 text-accent-orange">
        <ion-icon name="calendar" class="text-xl"></ion-icon>
        <span class="text-xs font-medium">Agenda</span>
      </a>
      <a href="#" class="flex flex-col items-center gap-1 text-gray-400 hover:text-accent-orange transition-colors">
        <ion-icon name="restaurant" class="text-xl"></ion-icon>
        <span class="text-xs font-medium">Dinner</span>
      </a>
    </nav>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
